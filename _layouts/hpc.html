<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.title }}">

  <!-- Favicon -->
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/plugins/bootstrap/css/bootstrap.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/plugins/font-awesome/css/all.css">

  <!-- MathJax for LaTeX equations -->
  <script>
    MathJax = {
      tex: { inlineMath: [['$','$'], ['\\(','\\)']] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
      color: #333;
      background: #fdfdfd;
    }
    .hpc-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }
    .hpc-header {
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: #fff;
      padding: 20px 0;
      margin-bottom: 30px;
    }
    .hpc-header .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .hpc-header a {
      color: #90caf9;
      text-decoration: none;
    }
    .hpc-header a:hover {
      color: #fff;
    }
    h1, h2, h3, h4 { color: #1a237e; }
    h1 { border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
    h2 { margin-top: 2em; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    table th, table td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    table th {
      background: #e8eaf6;
      font-weight: 600;
    }
    table tr:nth-child(even) { background: #f5f5f5; }

    pre {
      background: #263238;
      color: #eeffff;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 14px;
      line-height: 1.5;
    }
    code {
      background: #e8eaf6;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 90%;
    }
    pre code {
      background: transparent;
      padding: 0;
    }

    blockquote {
      border-left: 4px solid #1a237e;
      margin: 1em 0;
      padding: 10px 20px;
      background: #e8eaf6;
      border-radius: 0 6px 6px 0;
    }

    a { color: #1565c0; }
    a:hover { color: #0d47a1; }

    .hpc-footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 0.9em;
      border-top: 1px solid #eee;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="hpc-header">
    <div class="container">
      <a href="{{ site.baseurl }}/hpc/mid-test/">UTS Praktikum HPC</a>
      &nbsp;|&nbsp;
      <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    </div>
  </div>

  <div class="hpc-container">
    {{ content }}
  </div>

  <div class="hpc-footer">
    &copy; {{ site.title }} &mdash; Praktikum High Performance Computing
  </div>

  <script src="{{ site.baseurl }}/assets/plugins/jquery-1.11.3.min.js"></script>
  <script src="{{ site.baseurl }}/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
